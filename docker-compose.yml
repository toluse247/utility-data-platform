services:

  # ----------------------
  # ZOOKEEPER (Kafka dependency)
  # ----------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    ports:
      - "2181:2181"

  # ----------------------
  # KAFKA
  # ----------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data

  # ----------------------
  # KAFKA CONNECT
  # ----------------------
  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.6.0
    container_name: kafka-connect
    ports:
      - "8083:8083"
    environment:
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: "connect-group"
      CONNECT_CONFIG_STORAGE_TOPIC: "connect-configs"
      CONNECT_OFFSET_STORAGE_TOPIC: "connect-offsets"
      CONNECT_STATUS_STORAGE_TOPIC: "connect-status"
      CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_REST_ADVERTISED_HOST_NAME: localhost
      CONNECT_PLUGIN_PATH: "/usr/share/java,/kafka-connect-plugins"

    depends_on:
      - kafka
      - cassandra

    volumes:
      - ./kafka-connect-plugins:/kafka-connect-plugins
  # ----------------------
  # POSTGRESQL
  # ---------------------
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin1234
      POSTGRES_DB: utility_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data-model:/docker-entrypoint-initdb.d

  # ----------------------
  # AIRFLOW
  # ----------------------
  airflow:
    image: apache/airflow:2.8.1
    container_name: airflow
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow_db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

    volumes:
      - ./infrastructure/airflow/dags:/opt/airflow/dags
      - ./infrastructure/airflow/logs:/opt/airflow/logs
      - ./infrastructure/airflow/scripts:/opt/airflow/scripts
      - airflow_data:/opt/airflow
    ports:
      - "8081:8081"
    command: >
      bash -c "airflow db init &&
               airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@example.com &&
               airflow webserver & airflow scheduler"

  # ----------------------
  # SPARK (MASTER)
  # ----------------------
  spark-master:
    image: apache/spark:3.4.3
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_IVY=/tmp/.ivy2
    ports:
      - "7077:7077"
      - "8080:8080"
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
    volumes:
      - ./streaming_processing/spark_jobs:/opt/spark/jobs
      - spark_data:/bitnami/spark

  # ----------------------
  # SPARK (WORKER)
  # ----------------------

  spark-worker:
    image: apache/spark:3.4.3
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:
      - spark_worker_data:/bitnami/spark

# ----------------------
# MINIO (S3-Compatible Object Storage)
# ----------------------
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"   # MinIO web console & API
      - "9001:9001"   # Admin console
    environment:
      MINIO_ROOT_USER: minioadmin   # change to secure username
      MINIO_ROOT_PASSWORD: minioadmin1234  # change to secure password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data



  # ----------------------
  # CASSANDRA
  # ----------------------
  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra

  # ----------------------
  # MONGODB
  # ----------------------
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

# ----------------------
# VOLUMES (Persistent Storage)
# ----------------------
volumes:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  postgres_data:
  airflow_data:
  spark_data:
  spark_worker_data:
  cassandra_data:
  mongodb_data:
  minio_data:

